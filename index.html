<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishing Map Pro — Final Clean</title>
    
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        .panel { position: absolute; background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1; }
        
        /* СТАТУС-БАР РЫБНАДЗОРА (ИНФОРМАТИВНЫЙ) */
        #status-bar {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 650px; padding: 12px; border-radius: 12px;
            text-align: center; font-size: 14px; z-index: 2; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); color: white; transition: 0.3s; font-weight: bold;
        }
        #status-bar:hover { filter: brightness(1.1); transform: translateX(-50%) scale(1.01); }
        .status-ok { background: #27ae60; }
        .status-warning { background: #e67e22; }
        .status-danger { background: #e74c3c; }

        /* ОКНО ПРАВИЛ (ПОЛНОЕ: С ЭЛЕКТРОУДОЧКАМИ И СЕТЯМИ) */
        #rules-details {
            display: none; position: absolute; top: 75px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 580px; background: white; padding: 25px; border-radius: 15px;
            z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.4); border-top: 6px solid #e74c3c;
        }
        #rules-details h2 { margin-top: 0; font-size: 20px; color: #c0392b; border-bottom: 2px solid #f8f9fa; padding-bottom: 10px; }
        #rules-details ul { padding-left: 20px; font-size: 14px; line-height: 1.7; color: #2c3e50; }
        #rules-details li { margin-bottom: 8px; }
        #rules-details button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; font-weight: bold; }

        /* ФИЛЬТРЫ */
        #filter-panel { top: 85px; left: 15px; width: 180px; }
        .filter-btn { display: block; width: 100%; margin-bottom: 10px; padding: 12px; background: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .filter-btn.active { background: #e74c3c; }

        /* ПОГОДА */
        #weather-panel { top: 85px; right: 15px; width: 220px; }
        #weather-data { font-size: 13px; margin-top: 5px; color: #34495e; line-height: 1.4; }

        /* НАВИГАЦИЯ В ПОПАПЕ */
        .nav-links-container { display: flex; gap: 8px; margin-top: 15px; justify-content: center; }
        .nav-link { flex: 1; text-align: center; padding: 12px 5px; border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: bold; color: white; }
        .btn-yandex { background: #ffcc00; color: black; }
        .btn-2gis { background: #2ecc71; }
        .btn-internal { display: block; margin-top: 10px; padding: 12px; background: #34495e; color: white; text-align: center; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; border: none; width: 100%; }

        .action-btn {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 15px 35px; background: #27ae60; color: white; border: none; border-radius: 40px;
            font-size: 16px; font-weight: bold; cursor: pointer; z-index: 1; box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="status-bar" onclick="toggleRules()">Загрузка правил...</div>

    <div id="rules-details">
        <h2 id="rules-title">Правила рыболовства</h2>
        <div id="rules-content"></div>
        <button onclick="toggleRules()">Понятно, закрыть</button>
    </div>

    <div id="filter-panel" class="panel">
        <h3 style="margin: 0 0 10px 0; font-size: 14px; color: #7f8c8d;">🎯 ТОЧКИ</h3>
        <button class="filter-btn active" id="btn-all">Все места</button>
        <button class="filter-btn" id="btn-pike">Только Судак</button>
    </div>

    <div id="weather-panel" class="panel">
        <h3 style="margin: 0 0 5px 0; font-size: 14px; color: #7f8c8d;">⛅ ПОГОДА</h3>
        <div id="weather-data">Нажми на воду...</div>
    </div>

    <button id="add-mode-btn" class="action-btn">📍 ОТМЕТИТЬ ЯМУ</button>

    <script>
        const map = new maplibregl.Map({
            container: 'map',
            center: [46.035, 51.518], zoom: 11, minZoom: 9,
            pitch: 60, bearing: -15,
            style: {
                version: 8,
                sources: { 'satellite': { type: 'raster', tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'], tileSize: 256 } },
                layers: [{ id: 'satellite-layer', type: 'raster', source: 'satellite' }]
            }
        });

        map.addControl(new maplibregl.NavigationControl());
        const geolocate = new maplibregl.GeolocateControl({ positionOptions: { enableHighAccuracy: true }, trackUserLocation: true });
        map.addControl(geolocate);

        let userLocation = null;
        geolocate.on('geolocate', (e) => { userLocation = [e.coords.longitude, e.coords.latitude]; });
        let isAddMode = false;
        let mySavedSpots = JSON.parse(localStorage.getItem('myFishingSpots')) || { type: 'FeatureCollection', features: [] };

        // --- ТОТ САМЫЙ ТЕКСТ ПРАВИЛ ---
        function updateFishingStatus() {
            const now = new Date(); const month = now.getMonth(); 
            const sb = document.getElementById('status-bar'); const rc = document.getElementById('rules-content'); const rt = document.getElementById('rules-title');
            
            if (month === 4 || month === 5) { // Май - Июнь
                sb.className = 'status-danger'; sb.innerHTML = '🛑 НЕРЕСТОВЫЙ ЗАПРЕТ (до 30.06). Нажми для правил.';
                rt.innerHTML = '🛑 Правила нерестового запрета';
                rc.innerHTML = `<ul>
                    <li><b>Плавсредства:</b> Передвижение на любых лодках с моторами запрещено.</li>
                    <li><b>Места лова:</b> Ловля разрешена только с берега и ВНЕ мест нереста.</li>
                    <li><b>Снасть:</b> Разрешена 1 поплавочная или донная удочка на человека.</li>
                    <li><b>Ограничение:</b> Не более 2 крючков на одного рыболова.</li>
                </ul>`;
            } else if (month === 3) { // Апрель
                sb.className = 'status-warning'; sb.innerHTML = '⚠️ СКОРО ЗАПРЕТ (с 1 мая). Нажми для инфо.';
                rt.innerHTML = '⚠️ Предзапретный период';
                rc.innerHTML = `<p>До 1 мая разрешена ловля с лодок, но помните:</p>
                <ul>
                    <li><b>Норма вылова:</b> 5 кг рыбы на человека в сутки.</li>
                    <li><b>Запрещенные снасти:</b> Использование сетей, электроудочек, "пауков" и смыков запрещено!</li>
                    <li><b>Зимовальные ямы:</b> Ловля на них запрещена круглый год.</li>
                    <li><b>Минимальный размер:</b> Судак < 40см и Щука < 32см — обязательно отпустить.</li>
                </ul>`;
            } else { // Обычный сезон
                sb.className = 'status-ok'; sb.innerHTML = '✅ СЕЗОН ОТКРЫТ! Нажми для инфо.';
                rt.innerHTML = '✅ Общие правила рыболовства';
                rc.innerHTML = `<p>Действуют стандартные правила сезона:</p>
                <ul>
                    <li><b>Норма вылова:</b> 5 кг суммарно. Судак от 40см, Сазан от 40см.</li>
                    <li><b>Запретные зоны:</b> Ловля ближе 500м от плотин, мостов и шлюзов запрещена.</li>
                    <li><b>Запрещенные снасти:</b> Электроудочки, сети и любые взрывчатые вещества — уголовная ответственность.</li>
                </ul>`;
            }
        }
        function toggleRules() { const d = document.getElementById('rules-details'); d.style.display = (d.style.display === 'block') ? 'none' : 'block'; }
        updateFishingStatus();

        map.on('load', () => {
            map.addSource('route', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
            map.addLayer({ id: 'route-line', type: 'line', source: 'route', paint: { 'line-color': '#3498db', 'line-width': 6, 'line-opacity': 0.8 } });

            // Загружаем только точки (БЕЗ зон QGIS)
            map.addSource('fishing-spots', { type: 'geojson', data: './spots.geojson' });
            map.addLayer({ id: 'spots-layer', type: 'circle', source: 'fishing-spots', paint: { 'circle-radius': 9, 'circle-color': ['match', ['get', 'fish'], 'Судак', '#3498db', '#e74c3c'], 'circle-stroke-width': 2, 'circle-stroke-color': '#fff' } });

            map.addSource('my-spots', { type: 'geojson', data: mySavedSpots });
            map.addLayer({ id: 'my-spots-layer', type: 'circle', source: 'my-spots', paint: { 'circle-radius': 10, 'circle-color': '#f1c40f', 'circle-stroke-width': 2, 'circle-stroke-color': '#000' } });

            map.on('click', async (e) => {
                if (isAddMode) {
                    const name = prompt("Название ямы:"); if (!name) return;
                    const newF = { type: 'Feature', properties: { name, fish: 'Своя точка' }, geometry: { type: 'Point', coordinates: [e.lngLat.lng, e.lngLat.lat] } };
                    mySavedSpots.features.push(newF);
                    localStorage.setItem('myFishingSpots', JSON.stringify(mySavedSpots));
                    map.getSource('my-spots').setData(mySavedSpots);
                    toggleAddMode(); return;
                }

                const feats = map.queryRenderedFeatures(e.point, { layers: ['spots-layer', 'my-spots-layer'] });
                if (feats.length > 0) {
                    const coords = feats[0].geometry.coordinates;
                    const yaUrl = `https://yandex.ru/maps/?rtext=~${coords[1]},${coords[0]}&rtt=auto`;
                    const dgisUrl = `https://2gis.ru/routeSearch/rsType/car/to/${coords[0]}%2C${coords[1]}`;

                    new maplibregl.Popup().setLngLat(coords).setHTML(`
                        <div style="text-align:center; min-width: 170px;">
                            <b style="font-size:16px;">${feats[0].properties.name}</b><br>
                            <div class="nav-links-container">
                                <a href="${yaUrl}" target="_blank" class="nav-link btn-yandex">ЯНДЕКС</a>
                                <a href="${dgisUrl}" target="_blank" class="nav-link btn-2gis">2ГИС</a>
                            </div>
                            <button class="btn-internal" onclick="getRoute([${coords}])">🗺 ПУТЬ НА КАРТЕ</button>
                        </div>
                    `).addTo(map);
                } else {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${e.lngLat.lat}&longitude=${e.lngLat.lng}&current_weather=true`);
                    const d = await res.json();
                    document.getElementById('weather-data').innerHTML = `<b>${d.current_weather.temperature}°C</b><br>Ветер: ${d.current_weather.windspeed} км/ч`;
                }
            });
        });

        async function getRoute(endCoords) {
            if (!userLocation) { alert("Включите GPS!"); return; }
            const url = `https://router.project-osrm.org/route/v1/driving/${userLocation[0]},${userLocation[1]};${endCoords[0]},${endCoords[1]}?overview=full&geometries=geojson`;
            const response = await fetch(url);
            const data = await response.json();
            map.getSource('route').setData({ type: 'Feature', geometry: data.routes[0].geometry });
            const coordinates = data.routes[0].geometry.coordinates;
            const bnd = coordinates.reduce((acc, coord) => acc.extend(coord), new maplibregl.LngLatBounds(coordinates[0], coordinates[0]));
            map.fitBounds(bnd, { padding: 60 });
        }

        const addBtn = document.getElementById('add-mode-btn');
        function toggleAddMode() { isAddMode = !isAddMode; addBtn.classList.toggle('active'); addBtn.innerText = isAddMode ? "🛑 КЛИКНИ НА ВОДУ" : "📍 ОТМЕТИТЬ ЯМУ"; }
        addBtn.onclick = toggleAddMode;

        document.getElementById('btn-all').onclick = () => { map.setFilter('spots-layer', null); setActive('btn-all'); };
        document.getElementById('btn-pike').onclick = () => { map.setFilter('spots-layer', ['==', ['get', 'fish'], 'Судак']); setActive('btn-pike'); };
        function setActive(id) { document.getElementById('btn-all').classList.remove('active'); document.getElementById('btn-pike').classList.remove('active'); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
