<!DOCTYPE html>
<html>
<head>
    <title>Карта Рыбака</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 100vh; width: 100vw; margin: 0; padding: 0; }
        body { margin: 0; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // Инициализируем карту, центр на Саратове
        var map = L.map('map').setView([51.5, 46.0], 11);

        // Подключаем подложку (спутник Google)
        L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            attribution: '© Google'
        }).addTo(map);

        // Наши данные GeoJSON
        var fishingSpots = {
          "type": "FeatureCollection",
          "features": [
            { "type": "Feature", "geometry": { "type": "Point", "coordinates": [46.017161, 51.516095] }, "properties": { "name": "Пристань", "fish": "Щука", "type": "С суши" } },
            { "type": "Feature", "geometry": { "type": "Point", "coordinates": [45.996462, 51.466171] }, "properties": { "name": "Волгоградское водохранилище", "fish": "Судак", "type": "С лодки" } },
            { "type": "Feature", "geometry": { "type": "Point", "coordinates": [46.050520, 51.498836] }, "properties": { "name": "КП Берег", "fish": "Лещ", "type": "С суши" } }
          ]
        };

        // Добавляем точки на карту и создаем всплывающие окна
        L.geoJSON(fishingSpots, {
            onEachFeature: function (feature, layer) {
                var popupContent = "<b>" + feature.properties.name + "</b><br/>" +
                                   "🐟 Цель: " + feature.properties.fish + "<br/>" +
                                   "🎣 Способ: " + feature.properties.type;
                layer.bindPopup(popupContent);
            }
        }).addTo(map);
    </script>
</body>
</html>
